name: build-and-deploy

# Build the Go binary on a Linux runner, then ship it to the remote server
# over SSH and restart the app. No Docker — the app runs in the background
# via the deploy/*.sh scripts.

on:
  push:
    branches: [master]
  workflow_dispatch:        # allow manual runs from the Gitea UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 国内 Go 代理，避免 proxy.golang.org 被墙；goproxy.cn 同时代理 checksum
      # 校验，以及 GOTOOLCHAIN 自动下载的 Go 工具链（golang.org/toolchain）。
      GOPROXY: https://goproxy.cn,direct
      GOTOOLCHAIN: auto
    steps:
      # 从 gitea.com 的镜像拉 action，不走被墙的 github.com。
      - name: Checkout
        uses: https://gitea.com/actions/checkout@v4

      - name: Ensure C toolchain (go-sqlite3 needs CGO)
        run: |
          if ! command -v gcc >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
            else
              apt-get update && apt-get install -y --no-install-recommends build-essential
            fi
          fi
          gcc --version

      # 镜像不自带 Go，从国内镜像 golang.google.cn 装。版本直接读 go.mod，
      # 以后升级 Go 不用再改这里。
      - name: Setup Go
        run: |
          GO_VERSION="$(awk '/^go [0-9]/{print $2; exit}' go.mod)"
          echo "installing Go ${GO_VERSION}"
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO="sudo"
          wget -qO /tmp/go.tgz "https://golang.google.cn/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          $SUDO rm -rf /usr/local/go
          $SUDO tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version

      - name: UTF-8 encoding check
        run: go run ./tools/check_utf8.go

      - name: Build gang-server (linux/amd64, CGO)
        run: |
          go version
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" -o dist/gang-server .

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          timeout 30s ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary, config and scripts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_deploy
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
          )
          TARGET="$DEPLOY_USER@$DEPLOY_HOST"

          timeout 2m ssh "${SSH_OPTS[@]}" -p "$PORT" "$TARGET" "mkdir -p '$DEPLOY_PATH'"
          # Scripts + livekit config (overwrites in place).
          timeout 2m scp "${SSH_OPTS[@]}" -P "$PORT" deploy/lib.sh deploy/start.sh deploy/stop.sh deploy/restart.sh \
               "$TARGET:$DEPLOY_PATH/"
          timeout 2m scp "${SSH_OPTS[@]}" -P "$PORT" livekit-server/livekit.yaml "$TARGET:$DEPLOY_PATH/"
          # New binary lands as .new, swapped in atomically in the next step.
          timeout 10m scp "${SSH_OPTS[@]}" -P "$PORT" dist/gang-server "$TARGET:$DEPLOY_PATH/gang-server.new"

      - name: Swap binary and restart gang-server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          timeout 3m ssh \
            -i ~/.ssh/id_deploy \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -p "$PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' \
             && chmod +x lib.sh start.sh stop.sh restart.sh gang-server.new \
             && mv -f gang-server.new gang-server \
             && ./restart.sh gang"
