name: build-and-deploy

# Build the Go binary on a Linux runner, then ship it to the remote server
# over SSH and restart the app. No Docker — the app runs in the background
# via the deploy/*.sh scripts.

on:
  push:
    branches: [master]
  workflow_dispatch:        # allow manual runs from the Gitea UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 国内 Go 代理，避免 proxy.golang.org 被墙；goproxy.cn 同时代理 checksum
      # 校验，以及 GOTOOLCHAIN 自动下载的 Go 工具链（golang.org/toolchain）。
      GOPROXY: https://goproxy.cn,direct
      GOTOOLCHAIN: auto
    steps:
      # 从 github.com 拉 action（gitea.com 镜像间歇性 504 超时）。
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Ensure build and deploy tools
        run: |
          if ! command -v gcc >/dev/null 2>&1 || ! command -v rsync >/dev/null 2>&1; then
            SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO="sudo"
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends build-essential rsync
          fi
          gcc --version
          rsync --version | sed -n '1p'

      - name: Compute Go cache key
        id: go-cache-key
        run: |
          GO_VERSION="$(awk '/^go [0-9]/{print $2; exit}' go.mod)"
          MOD_HASH="$(sha256sum go.mod go.sum | sha256sum | awk '{print $1}')"
          echo "version=$GO_VERSION" >> "$GITHUB_OUTPUT"
          echo "sum=$MOD_HASH" >> "$GITHUB_OUTPUT"

      - name: Configure Go cache dirs
        run: |
          mkdir -p .cache/go-build .cache/go-mod
          echo "GOCACHE=$PWD/.cache/go-build" >> "$GITHUB_ENV"
          echo "GOMODCACHE=$PWD/.cache/go-mod" >> "$GITHUB_ENV"

      - name: Cache Go
        id: cache-go
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            .cache/go-build
            .cache/go-mod
          key: go-linux-amd64-${{ steps.go-cache-key.outputs.version }}-${{ steps.go-cache-key.outputs.sum }}
          restore-keys: |
            go-linux-amd64-${{ steps.go-cache-key.outputs.version }}-
            go-linux-amd64-

      # 镜像不自带 Go，从国内镜像 golang.google.cn 装。版本直接读 go.mod，
      # 以后升级 Go 不用再改这里。
      - name: Setup Go
        run: |
          GO_VERSION="$(awk '/^go [0-9]/{print $2; exit}' go.mod)"
          echo "installing Go ${GO_VERSION}"
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO="sudo"
          wget -qO /tmp/go.tgz "https://golang.google.cn/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          $SUDO rm -rf /usr/local/go
          $SUDO tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          export PATH="/usr/local/go/bin:$PATH"
          /usr/local/go/bin/go version
          go env GOCACHE GOMODCACHE
          echo "go cache hit: ${{ steps.cache-go.outputs.cache-hit }}"

      - name: UTF-8 encoding check
        run: go run ./tools/check_utf8.go

      - name: Build gang-server (linux/amd64, CGO)
        run: |
          go version
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" -o dist/gang-server .

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary, config and scripts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_deploy
            -o BatchMode=yes
          )
          RSYNC_SSH="ssh -i ~/.ssh/id_deploy -p $PORT -o BatchMode=yes"
          TARGET="$DEPLOY_USER@$DEPLOY_HOST"

          ssh "${SSH_OPTS[@]}" -p "$PORT" "$TARGET" "mkdir -p '$DEPLOY_PATH'"
          # Scripts + livekit config (overwrites in place).
          rsync -az --partial -e "$RSYNC_SSH" deploy/lib.sh deploy/start.sh deploy/stop.sh deploy/restart.sh \
               "$TARGET:$DEPLOY_PATH/"
          rsync -az --partial -e "$RSYNC_SSH" livekit-server/livekit.yaml "$TARGET:$DEPLOY_PATH/"
          # New binary lands as .new, swapped in atomically in the next step.
          rsync -az --partial -e "$RSYNC_SSH" dist/gang-server "$TARGET:$DEPLOY_PATH/gang-server.new"

      - name: Swap binary and restart gang-server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh \
            -i ~/.ssh/id_deploy \
            -o BatchMode=yes \
            -p "$PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' \
             && chmod +x lib.sh start.sh stop.sh restart.sh gang-server.new \
             && mv -f gang-server.new gang-server \
             && ./restart.sh gang"
